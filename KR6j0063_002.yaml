body:
  text: 大唐中印度三藏善無畏譯次作護身法明王手印誦此真言印頂等五處便成堅固護身真言曰唵嚩日囉二合祇寧上二合鉢囉二合儞去鉢多去二合也莎去訶去五遍誦之此是護身真言其手印相二小指叉入掌二無名雙押二小指叉上入掌中二中指頭直竪相著二頭指押二中指上節令頭指中節曲入大指直竪輔著中指此是護身手印次作大護身誦此真言及作手印亦五處成大護身真言曰唵入嚩二合囉囊也𤙖泮吒輕五遍誦之此是大護身真言其手印相即前護身印同次應被甲誦真言及作手印從頂摩觸下至於足即成被甲真言唵度比度比迦引也度比鉢囉二合入嚩引二合里寧上莎去訶去七遍誦之此是被甲真言其手印相散舒次以真言及手印而結髮真言曰唵蘇悉地羯哩莎訶此是結髮真言通三部用其手印相右手作拳直舒大母指印於頂上此是結髮印通三部用又佛部結髮真言曰囊上莽娑怛𭋺二合也地尾二合迦引難去薩囉嚩二合怛他蘖多去難唵蘇悉馱路者寧去莎去訶去七遍誦之此是佛部結髮真言蓮華部結髮真言曰囊上謨囉怛囊二合怛囉上二合夜也囊上莽鉢那莽二合簸儜上曳唵迦𪘨莎訶七遍誦之此是蓮華部結髮真言金剛部結髮真言曰囊謨囉怛囊上二合怛囉二合夜也囊莽室戰二合拏嚩日囉二合簸儜曳摩訶藥乞沙二合細囊鉢多上曳囊上莽迦去羅訖㗚二合旦引多𡀔比尼上升迦𭋺扇引底丁以反迦哩伽吒儞伽吒儞簸多也沙訶七遍誦之此是金剛部結髮真言其手印相與前印同置其寶座者本尊隨在方所先顧彼方次應心想大海於中寶山其山頂上想師子座於上復有微妙大蓮華臺於上復觀諸寶樓閣懸以繒幡上有傘蓋幢及羅網而以莊嚴運心想已後誦真言加彼前所想者一一成就即說成就大海真言曰唵阿毗莽嚕平娜地𤙖七遍誦之此是成就大海真言次說成就師子座真言曰唵阿上者羅𤙖泮吒三遍誦之次說成就寶山真言曰唵阿者羅微去𭋺莎去訶去三遍誦之次說成就蓮華真言曰唵迦莽羅莎訶三遍誦之次說成就寶樓閣等種種莊嚴真言曰唵囊上莽薩囉嚩二合怛他去蘖多去囊薩羅嚩二合他去嗚捺蘖二合帝吃龕二合娑破囉二合呬四莽暗二合伽伽輕囊劍去莎訶三遍誦之此是成就寶樓閣真言奉獻閼伽水者隨部差別及事成就相應而作瓦器所謂金銀熟銅石木及瓦商却縮枳知二合波此云樹葉荷葉等作勿令破缺麁澀孔穴盛滿香水隨部類及上中下而置諸花以辦事真言持誦復以部母真言等持誦即以閼伽水持誦置於左邊辦事真言及手印前所說辟除等真言手印是也次說部母等真言及手印初說佛部母真言曰囊上謨婆去伽輕嚩妬瑟膩二合沙去也唵嚕嚕娑普二合嚕什嚩二合羅底丁以反瑟咤二合悉馱去路者寧去薩囉嚩引二合囉他二合娑引馱寧莎訶此是佛部母真言佛眼是也三遍誦也蓮華部母真言曰那囉舍二合囊上娑嚩二合囉舍囊引弊毗也反室囉二合嚩娑莽二合囉嬭囊者瀉莽上含薩囉嚩二合薩怛嚩引二合難去薩囉嚩二合微也二合地指枳瑳上迦怛姪他唵迦𪘨微迦𪘨迦吒微迦吒迦揁吒應反迦𪘨婆去伽輕嚩底丁以反微若而也反曳莎訶三遍誦之此是蓮花部真言名半拏囉嚩私寧是也金剛部母真言曰囊上謨上羅怛囊上二合怛囉二合夜也囊莽室戰二合拏嚩日囉二合簸儜上曳摩訶去藥乞沙二合細囊鉢多上曳唵俱上蘭達哩滿馱泮吒三遍誦之此是金剛部母真言忙莾雞是也次說部心真言初佛部心真言曰唵爾囊爾迦七遍誦之蓮華部心真言曰唵阿去𡀔力迦七遍誦之金剛部心真言曰唵嚩日囉二合特嘞二合迦七遍誦之次說佛部母佛眼手印相合兩手屈二大指雙入掌中直附中指當中節內勿為屈節微屈頭指押二中指上節背此是佛根手印相次說蓮華部母手印相合掌十指並屈頭相著令掌中虛如未開蓮華仍腕相著此是蓮花母半拏羅嚩祇寧手印次說金剛部母忙莽計手印相合掌屈二頭指及二無名指入掌中背各相著餘六指並直竪相著此是金剛母忙莾計手印又說合掌屈二頭指及二無名指翻相叉押節頭右押左餘六指者並竪相著亦即是次說部心手印相初佛部心手印相八指相叉入掌中令八指中節露出其二大指直竪勿著頭指仍去半寸此是佛部心印次說蓮花部心印相依佛部心印惟改右大指屈入掌中獨竪左大指此是金剛心印其閼伽法隨部相應及事成就如教廣說奉獻之時以本真言持誦而獻奉請本尊者持誦之人隨作法處先想坐已次以真言手印成就車輅送本尊所車輅真言曰唵覩嚕覩嚕𤙖此是通三部送車輅真言其手印相二手中指以下六指相叉右押左入掌二頭指相著二大指輔中指側開兩掌腕相著六指互相著掌此是通三部送車輅手印送車輅已即應誦以此明中安來句及作手印或但獨請本尊或并眷屬召請送則左大指向外而舉迎則右大指向內而屈內外各三遍明曰囊上莽娑怛𭋺二合也地尾二合迦引難薩囉嚩二合怛他去蘖多去難唵嚩㘕引二合祗儞也二合羯囉灑上三合也莎訶此是通三部奉請明此明次應置迎句准上可知其手印依前車輅印惟改右大指與左中指頭相著此是通三部奉請印或以部心真言中置來句謂心真言次安曀曀去醯薄伽梵次去心真言即知迎句及手作印而請若以部心真言奉請本尊歡喜速來初佛部心真言曰唵爾囊邇迦二十五遍誦之其手印相依前部心印惟改以二大指向前招三遍即成請印此是佛部請召印蓮華部心真言曰唵阿去路力迦輕五遍誦之其手印相依前部心惟改以右大指向前三遍即成請召此是蓮花部請召之金剛部心真言曰唵嚩日囉二合特嘞二合迦引輕五遍其手印相依前部心印惟改左大指向前招三遍即成請印此是金剛部請召印欲奉請時先執香爐誦持真言淨治室中道路然後奉請淨治真言曰唵蘇上悉地迦哩入嚩二合里多去難馱慕輕利多上二合曳入嚩二合囉入嚩二合囉滿馱賀囊上賀囊𤙖泮吒輕此是金剛部淨治路真言亦呼二部佛部淨治路真言曰唵入嚩二合囉此是佛部淨治路真言蓮華部淨治路真言曰唵鉢那咩二合寧上婆上伽輕嚩底丁以反慕輕去賀也慕輕去賀也諾蘖知二合慕賀寧上莎訶此是蓮花部淨治路真言作此法已室中關鑰悉皆開解亦成辟除乃至清淨及成警覺本尊先作奉請真言其句曰曀醯曳呬婆上伽輕梵寧賀薄底夜二合囊上三莽曳囊者閼囉健二合者三鉢羅二合底丁以反誓鴟曳反南曇二合布若暗二合柘囉二合四去娜咩二合此是通三部奉請句真言前已說竟也隨其本尊坐處立及其歡喜等相乃至顧視行者作彼形狀相貌相應而奉請尊除遣從魔者有毗那夜迦名送諸尊請尊至即用枳里枳里真言及手印而遣除之真言曰唵枳里枳里嚩日囉二合𤙖泮吒輕七遍誦之此是枳里枳里真言其手印相以左手大指捻小指甲竪三指作嚩日囉二合形向外託之此是枳里枳里金剛印而用遣除視三磨耶者既除送尊毗那夜迦欲去本尊擬欲隨去是故視三摩耶令住莫去于時即以右手視印誦此真言令住謂其本尊憶惜本願真言曰唵升乘二合羯㘑三摩焰莎訶七遍誦之此是視三麼耶真言其手印相以右手大指捻小指甲竪三指作嚩日囉形向外託之此是枳里枳里金剛印用視之奉座令坐者先結內界金剛橛等地方及上已即奉閼伽然後請坐閼伽以本真言持誦而獻或以通用閼伽真言持誦隨其成就事部差別執閼伽器當置於心等乃至䠒跪而奉獻之謂三部當額奉獻其天部當心奉地部當膝真言曰唵藥乞衫二合囊上那去也見引捺囉二合達弩輕鉢哩二合也鉢捨去鉢捨莎訶此是通用誦閼伽器真言之印於晨朝時日中時及日暮時於此三時以其真言手印奉蓮華座初佛部真言曰唵微囉微囉引也莎訶此是佛部奉座真言蓮華部真言曰唵鉢那莽二合微囉引也莎訶此是蓮花部奉座真言金剛部真言唵嚩日囉二合微囉引也莎訶此是金剛部奉座真言其手印相合掌二手頭指中指無名指並相博著開掌中相去四指許大指及二小指並相著直竪此是通三部奉蓮華印若辦衣裳瓔珞等以辦事真言持誦奉獻結界法者以金剛𣐍法用結地界以金剛爐法用結上方金剛𣐍真言曰唵枳里枳里嚩日囉二合嚩日哩二合部囉滿馱滿馱𤙖泮吒此是金剛𣐍真言三遍誦之其手印相以左手中指無名指向外雙入右手中指無名指間以左手無名指絞右無名指二小指頭相著二大指頭相著二頭指直竪頭相著以此印翼兩臂令二大指頭著地而誦真言成結地界此是金剛𣐍印次以金剛鉤欄真言及手印用結上方界真言曰唵微娑普二合羅那羅二合乞沙二合嚩日囉二合半若而也反囉𤙖泮吒半音三遍誦此是金剛鉤欄真言其手印相依前𣐍印惟改二大指博著二頭指側舉印向上而誦真言成結空界此是金剛鉤欄印以金剛爐真言手印作金剛爐真言曰唵薩羅薩羅嚩日囉二合鉢囉二合迦囉𤙖泮吒此是金剛爐真言其手印相依前𣐍印惟改二大指開散直竪以印從南右轉三遍誦之真言成就金剛爐此是金剛爐印法云已前三界內相也次以金剛羂索真言手印結東方界真言曰唵嚩日囉二合簸賒醯唎二合伽伽囊麼囉𤙖三遍誦之此是金剛羂索真言其手印相以左手頭指屈著大指根以大指直竪押頭指甲微開孔餘三指相博著直竪右手亦然以右手三指背著左手三指內此是金剛罰索印用結東方界次以金剛幡真言及手印法結西方界真言曰唵鉢鐙祇寧上囉吒三遍誦之此是金剛幡真言其手印相以左手作掌直竪大指舒右五指側置左手大指頭上掌向身結西方界此是金剛幡印拳右手如左亦是此印次金剛迦引里真言手印結北方界真言曰唵嚩日囉二合迦引哩羅吒莽吒三遍誦之此是金剛迦里真言其手印相以二手大指二小指頭各相拄著餘六指各自屈向掌中勿令指背相著亦勿著掌中結北方界此是金剛迦里印次以金剛峯真言及手印結南方界真言曰唵嚩日囉二合尸佉囉羅吒莽吒三遍誦之此是金剛峯真言其手印相以左手作拳直竪大指右手大指頭指相捻大指頭少出將右手下側置其左手大指頭上令其右手大指直竪結南方界此是金剛峯印次用真言持誦右手掌七遍以指其成結下界真言曰唵商升二合羯㘑莎訶七遍誦之此是結下界真言三遍亦得次以阿三忙銀引儞真言及手印普作火院真言曰唵阿三𥌋引祇寧梨引咽聲三遍誦之此是阿三𥌋祇寧真言其手印相以右手指背置左手指內令無縫二大指向上直竪右轉一遍即成火院此是阿三𥌋祇寧印次以真言及手印重結大界真言曰唵商升二合羯㘑莽訶三莽焰莎訶七遍誦之此是結大界真言其手印相以二手小指無名指相叉入掌直竪二中指頭相著二頭指屈在中指背上節勿著中指如三股杵二大指在頭指側普轉八方上下及誦持真言成結大界此是結大界印如是作已假使側近輪王佛頂及餘相違諸真言者不能為壞亦不損減本尊威力諸有破明繫嚩及諸却著法皆不得便備嚩日囉等者諸金剛數珠指環腰線神線臂釧蓮華標旗等勿以香水或餘物淨用本尊真言而持誦之於念誦時及護摩時皆須具備如上等物次說成就嚩日囉等諸餘物法其嚩日囉隨其相應置器中當自面前安置座上以紫檀香而用塗之次以香花等執持供養請真言之主彼真言持誦香花而用供養又誦千遍即名成就是嚩日囉真言曰唵度那嚩日囉二合訶此是成就嚩日囉真言其縛日囉以紫檀等三股而作持誦千遍次說佛部淨數珠真言曰那謨羅怛囊二合怛囉二合夜也唵閼娜薄二合帝微若而也反曳悉地悉馱㗚替二合莎訶此是佛部淨數珠真言蓮華部數珠真言曰那謨鉢特莽二合簸拏曳唵暗沒哩二合登伽袂室里二合曳室唎二合忙里儞莎訶此是蓮華部淨數珠真言金剛部淨數珠真言曰那謨羅怛囊二合怛羅二合夜也那莽室戰二合拏嚩日囉二合簸儜曳摩訶藥乞沙二合細囊鉢跢曳唵枳里枳里勞知哩二合尼莎訶此是金剛部淨數珠真言各以此三部淨數珠真言隨其本部真言用穿數珠孔一一珠顆持誦七遍乃至穿繫畢已又更持誦真言百遍復如前法而淨數珠復以此真言而作成就初佛部成就數珠真言曰唵那謨婆伽嚩底悉悌娑馱也悉馱引㗚替二合莎訶此是佛部成就數珠真言蓮華部成就數珠真言曰唵縛蘇莽底室里二合曳鉢特莽二合忙里儞莎訶此是蓮華部成就數珠真言金剛部成就數珠真言曰唵嚩日囉引二合爾耽若曳莎訶是此金剛部成就數珠真言以此成就數珠真言請其本部真言於數珠上乃至供養時持誦千遍以為成就次說執持數珠手印之相以右手大指捻無名指頭直舒中指小指微屈以頭指著中指上節側此是通三部執數珠印次說蓮華部執數珠印相以右手大指捻其中指頭餘三指直舒左手亦然此是蓮花部執數珠印次說金剛部執數珠印相以右手作拳展直大指捻頭指左手亦然此是金剛部執數珠印以活兒子佛部為數珠以蓮花子中部為數珠以嚕捺囉二合叉子金剛部為數珠又說取活兒子蓮花子嚕捺囉二合叉子商佉及石木槵鉛錫熟銅琉璃隨取其一數過百量而作數珠以右手執心不散亂真言誦畢一時當掐勿令前後次說臂釧之法其臂釧中穿一活兒子等珠以部母真言手印持誦香花而用供養及香水灑還以此部母真言手印請來加持釧上復以部母真言手印次第供養乃至持誦千遍以捺婆草作環置無名指用部心真言如前作法成就乃至持誦千遍各作本部次第應知其腰線法令童女搓合以俱遜婆染此云紅藍花或鬱金染如前法成就乃至持誦千遍於念誦時護摩時及以睡時繫於腰間能止失精成就腰線真言曰唵阿羅阿羅滿馱儞輕縮訖囉二合馱引囉尼上悉馱引重㗚替二合莎訶去
