  - {type: variant, offset: 6020, length: 98, content: 丹藏即云「蘇悉地羯羅經」，名既不同、文亦大異，譯人一也。今撿丹藏之經，國、宋藏中始終皆無供養法者，丹藏亦於感函有之，委尋《開元》、《貞元》二錄，善無畏譯只有三經一法，而無此供養法。今以目錄雖無，詳其文義，非是後人偽妄集者，故依丹藏兩俱存焉, 明: ''}
