body:
  text: 大唐中印度三藏善無畏譯歸命諸如來及法菩薩眾蓮花金剛部并諸眷屬等我今依教說供養持誦法省略通三部次第及相應先見神室處復明其事法對受得真言及作手印法於外出入處分土洗淨法灑掃神室處除萎花等法澡浴自灌頂獻三掬水法往於神室門換衣灑身法入室便禮拜辦諸供具法數珠及神線茅草鐶等法奉獻閼伽水及置寶座法復示三麼耶去身障難法辟除及瀉垢清淨光澤法護身及結界八方上下法初應想神座觀念本尊法隨所在方處奉請於尊法以其本真言啟請本尊已即除遣從魔奉座令坐法復示三摩耶即奉閼伽水浴尊奉衣法次獻塗香花燒香及飲食燃燈供養法真言并手印運心供養法讚歎懺悔等護身及己身并護其處所便結大界法備具嚩日羅及數珠等法充滿真言分次坐持誦法求請本所願及護所念誦迴施功德法起廣大發願又奉閼伽水塗燒香等法復視三摩耶護身及己身解所結方界然後發遣法護摩支分等謂爐神及地燒祀之具法轉讀方廣經及作制底法次作慈等觀思惟六念法如是等次第我今略詮竟見神室處者謂入曼荼羅散花所墮歸依彼尊明其事法者謂得最勝受明灌頂奉阿闍梨之所印可令傳法灌頂乃至令作諸餘灌頂對受真言及手印者謂受法人澡浴清淨著新潔衣於其淨處䠒跪恭敬對阿闍梨親受真言及作手印時阿闍梨先誦三遍轉授與彼彼受得已自誦三遍深生歡喜頂戴奉持此為對受隨力所辦奉阿闍梨廣解法已方可作此念誦次第外出入處者為晨朝起已所往穢處當用不淨忿怒真言而作護身真言曰唵句𡀔二合拖囊上聲呼之𤙖若而也反其手印相以右手作拳直竪大母指當護五處謂頂兩肩及心咽項上已上小心印別有大印次分土洗淨者謂以五聚土當洗下部以三聚土洗小便處以三聚土獨洗左手以七聚土共洗兩手或恐未淨任己洗之以淨為限已上聚土皆用觸呪及印印及持七遍然後用之次以真言而用灑身真言曰唵戍嚕二合底丁以反娑沒㗚二合底同上丁以反陀重羅尼上吽訶上三遍誦之其手印相以右手直舒五指指頭相博次屈無名指中節與掌相當以大母指小輔向前其灑水法蹲踞而默兩手置於雙膝之間印手掬水勿有泡沫無聲飲之三度飲已然後用手霑水兩度拭唇于時口中於其齒間舌觸垢穢涕唾欬嗽更復如前飲水拭唇還以此印及誦真言於其印中大指及無名指先拄兩目次口兩耳鼻及兩肩臍心咽頸上拄便成護身諸根清淨次灑掃神室者謂隨其成就及事差別與彼相應而擇方處及意可樂無諸障難其地除去嚩䋙蟲窠坑窟瓦礫糠骨毛髮鹹炭灰等掘去惡土填以淨土於上造室堅牢密作勿令風入門向東開或北或西隨事向南作神室已用牛糞塗以淨水灑或以塗香即和淨水當誦此明而塗其地明曰那上莽娑底丁以反𭋺也一二合儞尾二合迦引南二薩去羅嚩二合怛他去蘖哆南去三闇引四尾羅視尾囉視五摩訶去嚩日囉二合六薩多上薩多上七娑去囉帝八娑去囉底九怛囉二合以十怛羅二合以十一尾陀莽寧上十二三去伴若而也反寧上十三多上囉莽底丁以反十四悉陀引仡隷二合十五怛㘕二合十六莎去訶去三遍誦之或時忘念法則錯誤犯三摩耶每日當誦此明三七遍或百八遍能除其過除萎花者供養尊花已先誦此明除其萎花曰唵稅帝摩訶去稅帝佉去娜寧去莎去訶去次說掃地明曰唵賀羅賀羅囉茹㜸囉二合賀囉那引也莎去訶去次說塗地明曰唵羯囉二合引隷摩訶去羯羅隷莎去訶去三遍誦之先應灑掃神室除去萎花淨諸供器然後方去澡浴教說如是往澡浴時先以此明及印護諸供具然後可往明曰唵尸却哩二合嚩無可反日哩二合闇引三遍誦之其手印相以右手作拳直竪大指頭指二指相著先作三摩耶者謂凡作法先作三摩耶然後作護身等一切諸事教如是說次說三摩耶真言及手印初佛部真言曰唵怛他去㜸姤一娜婆二合嚩引也二莎去訶去三遍誦之此是佛部三摩耶真言其手印相仰兩手十指直向前舒並側相著微屈兩頭指上節此是三摩耶手印次說蓮華部三摩耶真言及手印真言曰唵鉢娜謨上二合娜婆二合嚩引也莎訶此是蓮花部三摩耶真言其莎訶皆去音其手印相先當合掌中間兩手六指向外舒散勿令相著其大指及小指兩手依舊相著合掌中虛如間蓮花微屈中間六指此是蓮花部三摩耶手印次說金剛部三摩耶真言及手印真言曰唵嚩日路二合娜婆二合嚩引也莎訶三遍誦之此是金剛三摩耶真言其手印相右押左兩手背逆相著以右手大指叉其左手小指左手大指著其右手小指中間兩手六指微令開如三股杵此是金剛三摩耶手印結縛諸難者謂以軍荼利手印真言而縛諸難其手印相左手置於右手膊跟上以大指捻小指甲展中三指如三股杵復以右手置於左膊跟上亦以大指捻小指甲展中三指如三股杵而向東立屈其左脚膝臨向前就於右脚右脚闊展二尺以來橫著躡地咬下右唇怒目左視默想自身如軍荼利誦其根本真言曰囊上謨上囉怛囊上二合怛囉二合夜野囊上莽室戰拏嚩日囉二合簸儜上曳引莽訶上藥乞沙二合細囊鉢多上曳引囊謨嚩日囉二合句路二合駄野引能去瑟吒路二合得羯二合吒婆也珮囉嚩引野怛姪他去唵闇沒㗚二合多上軍去拏里佉佉佉佉却引醯却引醯㜸囉若二合微娑鋪二合吒野微娑鋪二合吒野薩囉二合嚩尾近囊上二合微囊亦迦劍二合摩訶去言上儜上鉢底餌尾旦引多迦囉引野𤙖泮吒二合七遍誦之此是繫縛諸難真言真言最下滿馱滿馱句即其兩手三指便作拳把所捻小指依舊勿動其諸難者便成繼縛澡浴法者先以真言手印取土作三聚為淨身故真言曰唵寧上佉囊上嚩蘇上提莎訶五遍誦之此是淨土真言其手印相兩手相叉指捻手背雙竪二頭指相著二大母指並竪博頭指側以此手印蓋所取土誦真言五遍然後取之辟除者凡所作一切事先須辟除然後方作一切諸事教說如是辟除真言曰囊上謨上嚩日囉引二合也𤙖賀囊上鈍囊上莽他上尾跢崩二合娑瑜瑳去囉也𤙖泮吒七遍誦之此辟除真言其手印相以左手大指屈入掌中以中指無名指而押大指屈其頭指著中指中節側亦屈小指著無名指中節側即舒努臂頭上右轉三遍及印身五處右手大指押小指甲餘三指直竪作嚩日囉形叉其腰側立法如前此是辟除印又辟除真言及手印真言曰唵嚩日囉二合多去囉上𤙖泮吒此是辟除真言其手印相以右手指左手掌如是三遍此是辟除手印又辟除真言及手印真言曰唵枳里枳羅去囉去嚩咾捺囉二合𤙖泮吒輕此是辟除真言其手印相以兩手各作彈指聲三遍此是辟除印護身法者以此真言及手印用結十方界及以護身真言曰唵商僧二合迦𭋺三莽焰莎訶此護身結界真言其手印相以右手大指捻小指甲上餘三指微開直竪名嚩日囉印用結上下及八方界并護身用此是結界護身等印次以真言手印用印自身及以水土澡豆等物便成瀉垢及與清淨真言曰唵枳里嚩日囉二合𤙖泮吒七遍誦之此是瀉垢真言其手印相以右手大指捻小指甲上餘三指微開直竪叉腰間三指向前左手亦作此印用印觸諸物即成瀉垢及與清淨此是瀉垢印次以軍荼利真言及手印用作清淨真言曰唵闇沒㗚二合帝𤙖泮吒七遍誦之此是清淨真言其手印相以右手作拳取水念誦七遍用灑諸物及手頂上便成清淨此是清淨印次以真言及手印用作光澤真言曰唵枳里枳里嚩日囉二合𤙖泮吒七遍誦之此是光澤真言其手印相以左手大指捻小指甲上餘三指微開直竪舒其膊還以右手作此印承左手肘下以右手印印諸觸物及以己身即成光澤此是光澤印次以真言及手印用攪其水真言曰唵𤙖賀囊上嚩日囉二合嚩日𭋺二合儜上訶不限遍數惟多誦此是攪水真言其手印相兩手向外相叉以二大指並竪合頭屈二頭指稍屈頭甲相著此是攪水印次以真言及手印取土塗身真言曰唵部囉若而也反嚩二合囉𤙖七遍誦之此是塗土真言其手印相取土和水兩手相揩以右手遍塗身此是土塗身印次以軍荼利真言手印持誦水真言曰唵闇沒㗚二合帝𤙖泮吒七遍誦之此是持誦水真言其手印相先平舒右手以大指押其中指無名指甲上稍屈頭指小指持誦真言以印攪水澡浴此是持誦水印次以真言及手印遣除身中毘那夜迦難真言曰唵闇沒㗚二合帝賀囊賀囊上𤙖泮吒此是遣除身中毘那夜迦真言其手印相以兩手大指屈入掌中作拳舒二頭指左右相叉入虎口中以印從頭頂向下至足而略去之此是遣除身中毘那夜迦印次則應以軍荼利真言及手印護身五處真言曰唵嚩日囉二合祇寧上二合鉢囉二合儞去鉢多二合也莎訶五遍誦之此是護身真言其手印相以二小指相叉入掌中無名指雙押二小指叉上二中指頭相著二頭指微屈在中指上節側相去一大麥許直竪二大指在中指側印觸五處印成護身此是護身印次以真言及手印持誦一一分土真言曰唵度比度迦去也度比鉢囉二合支嚩去二合里寧上莎訶三遍誦之此是持誦土真言其手印相以二手頭指小指頭相著二中指二無名指屈入掌中指背相著以二大指各捻中指無名指頭前所置三聚土取一分以印印土持誦三遍用洗從足至臍即洗其手用水灑淨第二第三亦如是洗及以灑淨又取一聚如前持誦用洗從臍至頸又取一聚如前持誦用洗從頸至頂畢已還誦真言隨意澡浴還作此印亦誦真言遍轉於身當心解印是名被甲印此是持誦土印次誦軍荼利根本真言攪以手印水隨意澡浴真言曰囊上謨上囉怛囊上二合怛囉二合夜也那莽室戰二合拏嚩日囉二合簸儜上曳摩訶去藥乞沙二合細囊鉢多曳那謨嚩日囉二合句路二合馳也鉢囉二合若而也反嚩二合里多上儞去鉢多去二合能去瑟吒咾二合得迦二合吒婆上也珮囉嚩去也阿徙母輕呼娑囉嚩日囉二合鉢囉輸簸捨賀娑多去二合也怛儞也二合他唵闇沒㗚二合多軍去拏里佉佉佉佉佉去囊佉囊佉囊佉囊佉去那佉那佉那佉那佉呬佉呬佉呬佉呬底丁以反瑟吒底瑟咤賀囊賀囊那賀那賀鉢者鉢者蘖㗚二合恨儜二合蘖㗚二合恨寧二合滿馱滿馱蘖呼咽重囉若蘖㗚若怛囉若怛囉若微娑鋪吒也微娑鋪吒也婆伽梵囊上沒㗚二合多軍去拏里慕引輕呼囉彈難二合多拏上也嚩日囉二合儜上薩囉嚩二合尾近囊上微囊也劍寧上嚩去羅也摩訶言儜上鉢底餌尾旦多迦囉也𤙖泮吒句路二合馱引鐶囊上二合曳莎訶三遍誦之此是澡浴真言其灌頂真言以此真言及手印而自灌頂真言曰唵賀臛二合佉里里𤙖泮吒三遍誦此灌頂真言其手印相以二小指相叉入掌二無名指雙押二小指叉上入掌中二中指頭直竪相著二頭指押二中指上節令頭指中節曲二大指輔著二頭指側以印相取水持誦真言三遍而自灌頂此是灌頂印次以真言及手印而自結髮真言曰唵蘇悉地羯里莎訶三遍誦之此是結髮真言通三部用其手印相右手作拳直舒大母指以屈頭指押大指頭上令頭指圓曲作此印持誦真言三遍置於頂上即成結髮此是結髮印又佛部結髮真言曰唵尸祇尸契莎訶去三遍誦之又蓮花部結髮真言曰唵尸契莎訶三遍誦之金剛部結髮真言曰唵尸佉寫莎訶三遍誦之凡澡浴時不應就於淤泥水中或水有刺或懸駛水或狹渠淺水旋渦急流多蟲渾水溉灌田水及坑中水如是之水並勿澡浴又復不應於其水中及以水側大小便利不得水中跳走急行沒浮等戲止在水中勿視隱處亦不思想婦人隱處及與腰嬭諸餘支分應當寂靜默然澡浴但令去垢勿為嚴身之想獻三掬水者洗浴了已面向本尊所居之方觀念本尊持誦真言及作手印以印掬水而獻之想浴本尊及奉閼伽或於水中有三種驗水至膝中名為下驗水至臍邊是為中驗水至項中是為上驗於三水中隨意念誦方詣道場佛部獻水真言曰唵帝囉𭋺佛哺時反陀莎訶三遍誦之此是佛部奉三掬水真言又蓮華部獻水真言曰唵避哩避哩𤙖泮吒三遍誦之此是蓮花部奉三掬水真言又金剛部獻水真言曰唵微濕嚩二合嚩日𭋺二合莎訶三遍誦之此是金剛部奉三掬水真言通三部手印相平仰兩手側相著以二頭指捻二大指頭六指微似屈以印掬水持誦真言三度奉浴本尊此是通三部奉三掬水手印往於神室者謂入向道場之時勿起嗔恚及與貪欲專念本尊而往去之於中不應驀過器仗及諸藥草謂種種器騎乘鈴鐸及諸印其萎花藥味一切草木皆不應驀制底尊像比丘等影皆不應驀亦勿乘騎象馬駱駝牛羊驢等及一切諸乘畫像印等皆不應踏身手相觸若犯此等墮三麼耶亦不應起貪瞋癡慢掉舉憍等當著木屐而往神室中遇制底尊容師長及以神廟當脫木屐便申致敬方至道場次換衣灑身者謂道場門外而六洗手及足用前所說護淨真言手印飲水拭唇如前重更飲水灑淨已即依行用是為通三部又佛部飲水灑淨真言曰唵摩訶去入嚩二合囉𤙖此是佛部灑淨水真言又蓮華部飲水灑淨真言曰唵覩吒矩反覩同上羅俱上嚕俱嚕莎訶此是蓮花部灑淨真言又金剛部飲水灑淨真言曰唵入嚩二合里多嚩日里二合尼上輕呼𤙖此金剛部灑淨真言又說佛部飲水灑淨手印仰舒右手屈無名指向內勿著掌此是佛部灑淨水印又說蓮華部飲水灑淨手印仰舒右手無名指向內勿令掌著散開頭指小指此是金剛部灑淨水印次以真言手印灑淨門外所授之衣真言曰唵微莽囉莎訶此是灑淨換衣真言其手印相以右手作拳取水持誦用灑淨衣此是灑淨換衣手印次以真言持誦其衣而著真言曰唵鉢哩嚩囉上二合跛嚩日里二合尼上𤙖此是著衣真言無手印入室便禮者如教所說行者一心當入神室既入室已面向於尊合掌曲身首不稽地先於室內當置尊容幀或制多或但置座入便禮已而供養之辦供養具者謂塗香等五種牛淨神線茅環己身之座及閼伽器金剛白芥子繫腰線等是名供具先當辦之入室之時口誦真言而入真言曰唵入嚩二合哩多二合路者泥𤙖泮吒七遍誦之此是入室真言三部通用次即應作三麼耶真言及印初佛部真言曰唵怛他蘖姤那婆二合嚩也莎訶去五遍誦之此是佛部三麼耶真言其手印相仰兩手十指直向前舒並側相著微屈二頭指上節此是佛部三麼耶手印次說蓮華部三麼耶真言及手印真言曰唵鉢那謨上那婆二合嚩引也莎訶去五遍誦之此是蓮華部三麼耶真言其手印先相當合掌中間兩手六指向外舒散勿令相著其大指及小指兩手依舊相著令掌中虛如開蓮華微屈中間六指此是蓮花部三麼耶手印次說金剛部三麼耶真言及手印真言曰唵嚩日𡀔二合那婆二合嚩引也莎訶去五遍誦之此是金剛部三麼耶真言其手印相右押左兩手背逆相著以右手大指叉其左手小指左手大指叉其右手小指中間兩手六指微令開如三股杵此是金剛部三麼耶手印此三印名為大印諸佛菩薩猶不能違何況諸魔類等各當自部依次第用奉行之法非但順教亦滅諸罪以除諸難所求之法必得順願次應以真言及手印遣除身中毘那夜迦難真言曰唵闇沒㗚二合帝賀囊上賀囊上𤙖泮吒此是遣除身中毘那夜迦難真言其手印相以兩手大指屈入掌中作拳舒二頭指左右相叉入虎口中以印從頂向下至足而略去之此是遣除毘那夜迦難等手印次應以真言及手印辟除真言曰囊謨上嚩日囉引二合也𤙖上賀囊上鈍囊上莽他上尾特網無奉反二合娑瑜瑳去囉也𤙖泮吒七遍誦之此是辟除真言其手印相以左手大指屈入掌中以中指無名指而押大指屈其頭指著中指節側亦屈小指著無名指中節側即舒努臂頭上右轉三遍及印觸身五處右手大指押小指甲餘三指直竪作嚩日囉二合形叉其腰側立法如前此是辟除印又辟除真言及手印真言曰唵嚩日囉二合多去囉𤙖泮吒三遍誦之此是辟除真言其手印相以右手拍左手掌如是三遍此是辟除手印又辟除真言及手印真言曰唵枳里枳里囉嚩咾捺囉二合𤙖泮吒此是辟除真言其手印相以兩手彈指三遍此是辟除手印云何名為辟除謂於神室花等衣裳及座等物所有諸難擯隨令去名辟除即得清淨次說真言及手印而作瀉垢真言曰唵枳里枳里嚩日囉二合𤙖泮吒七遍誦之此是瀉垢真言其手印相以右手大指捻小指甲上餘三指微開直竪叉腰間三指向前左手亦作此印用印諸物令除穢惡名曰瀉垢此枳里忿怒瀉垢手印次作清淨佛部心真言而拳取香水持誦七遍用灑諸物便成清淨初佛部心真言曰唵爾囊上爾迦二合七遍誦之蓮華部心真言曰唵阿去𡀔力迦此是蓮花部心真言金剛部心真言曰唵嚩日囉二合特嘞二合迦輕呼金剛部心真言次作光澤持真言及作手印以印諸物便成光澤初佛部光澤真言曰唵帝誓而曳反帝若而也反徙尾二合寧上聲徙提去重娑去一馱也𤙖泮吒三遍誦之此是佛部光澤真言蓮花部光澤真言曰唵儞去比也二合儞去比也二合儞去一跛也摩訶去室哩二合曳莎訶去三遍誦此是蓮花部光澤真言金剛部光澤真言曰唵入嚩二合羅入嚩引二合羅也滿度哩莎訶三遍誦之此是金剛部光澤真言其手印相以左手大指捻小指甲上餘三指微開直竪舒其膊還以右手亦作此印承左手肘下以手印印觸諸物即成光澤通三部用此是通三部光澤手印丹藏即云蘇悉地羯羅經名既不同文亦大異譯人一也今撿丹藏之經國宋藏中始終皆無供養法者丹藏亦於感函有之委尋開元貞元二錄善無畏譯只有三經一法而無此供養法今以目錄雖無詳其文義非是後人偽妄集者故依丹藏兩俱存焉
